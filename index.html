<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Dashboard</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <!-- Shared styles -->
  <link rel="stylesheet" href="shared.css">

  <style>
    /* ── Viewport-fit: no scroll, fills screen exactly ───── */
    html, body { height: 100%; overflow: hidden; }

    /* Override shared.css .main for this page only */
    .main {
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 18px 28px 14px;
      /* shared.css sets margin-left and max-width — keep those */
    }

    /* Greeting strip */
    .greeting {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      flex-shrink: 0;
    }

    .greeting-text h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -.02em;
    }

    .greeting-text p {
      font-size: 12px;
      color: var(--text-3);
      margin-top: 2px;
    }

    /* Quick actions bar */
    .quick-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .quick-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 12px;
      color: var(--text-2);
      cursor: pointer;
      text-decoration: none;
      transition: border-color .15s, color .15s, background .15s;
      font-family: var(--font-ui);
    }

    .quick-btn:hover { border-color: var(--border-2); color: var(--text); background: var(--surface-2); }
    .quick-btn .dot  { width: 6px; height: 6px; border-radius: 50%; }

    /* Main grid — fills remaining vertical space */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 12px;
      flex: 1;           /* takes all remaining height */
      min-height: 0;     /* allow grid to shrink */
    }

    /* Each card fills its grid cell */
    .main-grid > .card,
    .main-grid > div {
      min-height: 0;
      overflow: hidden;
    }

    .widget-gastos { grid-column: 1 / 2; grid-row: 1 / 2; }
    .widget-clases { grid-column: 2 / 3; grid-row: 1 / 2; }
    .widget-meta   { grid-column: 1 / 2; grid-row: 2 / 3; }

    /* Right-bottom: date + streak stacked, shares the grid cell */
    .col-right-bottom {
      grid-column: 2 / 3;
      grid-row: 2 / 3;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
    }

    .col-right-bottom .card { flex: 1; min-height: 0; overflow: hidden; }

    /* Cards fill their cell height */
    .card {
      height: 100%;
      overflow: hidden;
    }

    /* Scroll inner content of tall widgets if needed */
    #widget-gastos,
    #widget-clases,
    #widget-meta { overflow-y: auto; }

    /* Accent borders */
    .widget-date-card  { border-left: 3px solid var(--accent); }

    /* Streak widget */
    .streak-days {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .streak-day {
      width: 18px; height: 18px;
      border-radius: 3px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      font-size: 8px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-3);
    }

    .streak-day.active { background: var(--accent-bg); border-color: var(--accent-dim); color: var(--accent); }
    .streak-day.today  { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: 700; }

    /* Pulse dot */
    .pulse-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .5; transform: scale(.75); }
    }

    /* Fade-in animation */
    .card { animation: fadeUp .3s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .main-grid > *:nth-child(1) { animation-delay: .05s; }
    .main-grid > *:nth-child(2) { animation-delay: .10s; }
    .main-grid > *:nth-child(3) { animation-delay: .15s; }
    .main-grid > *:nth-child(4) { animation-delay: .20s; }
  </style>
</head>
<body>

  <!-- ── Sidebar ─────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="brand">LifeOS</div>
      <div class="sub">Panel personal de Tobías</div>
    </div>

    <nav class="nav-section">
      <div class="nav-label">Principal</div>
      <a class="nav-item active" href="index.html">
        <span class="nav-icon">🏠</span>
        Dashboard
      </a>
      <a class="nav-item" href="facultad.html">
        <span class="nav-icon">🎓</span>
        Facultad
      </a>
      <a class="nav-item" href="finanzas.html">
        <span class="nav-icon">💰</span>
        Finanzas
      </a>
      <a class="nav-item" href="metas.html">
        <span class="nav-icon">🎯</span>
        Objetivos
      </a>
    </nav>

    <nav class="nav-section" style="margin-top:auto;padding-top:8px;border-top:1px solid var(--border)">
      <div class="nav-label">Accesos</div>
      <a class="nav-item" href="https://github.com/TobiasRossi" target="_blank">
        <span class="nav-icon">💻</span>
        GitHub
      </a>
      <a class="nav-item" href="https://www.linkedin.com/in/rossi-tobias/" target="_blank">
        <span class="nav-icon">🔗</span>

      </a>
      <a class="nav-item" href="#" id="btn-clear-demo">
        <span class="nav-icon">🗑️</span>
        Limpiar todos los datos

    </nav>

    <div class="sidebar-bottom">
      <div class="sidebar-user">
        <div class="avatar">TR</div>
        <div>
          <div class="user-name" id="sidebar-username">...</div>
          
        </div>
      </div>
      <a href="#" id="btn-signout" class="btn-signout">⎋ Cerrar sesión</a>
    </div>
  </aside>

  <!-- ── Main ────────────────────────────────────────────── -->
  <main class="main">

    <!-- Greeting -->
    <div class="greeting">
      <div class="greeting-text">
        <h1 id="greeting-msg">Buenos días, Toto 👋</h1>
        <p id="greeting-sub">Cargando resumen del día...</p>
      </div>
      <div class="pulse-dot"></div>
    </div>

    <!-- Quick actions -->
    <div class="quick-actions">
      <a class="quick-btn" href="facultad.html">
        <span class="dot" style="background:var(--purple)"></span>
        Facultad
      </a>
      <a class="quick-btn" href="finanzas.html">
        <span class="dot" style="background:var(--coral)"></span>
        Finanzas
      </a>
      <a class="quick-btn" href="metas.html">
        <span class="dot" style="background:var(--amber)"></span>
        Objetivos
      </a>
    </div>

    <!-- Main widget grid -->
    <div class="main-grid">

      <!-- Widget: Finanzas -->
      <div class="card widget-gastos" id="widget-gastos">
        <div class="card-label">Cargando...</div>
      </div>

      <!-- Widget: Próximas clases -->
      <div class="card widget-clases" id="widget-clases">
        <div class="card-label">Cargando...</div>
      </div>

      <!-- Widget: Meta principal -->
      <div class="card widget-meta" id="widget-meta">
        <div class="card-label">Cargando...</div>
      </div>

      <!-- Widget: Fecha -->
      <div class="col-right-bottom">
        <div class="card widget-date-card" id="widget-date">
          <div class="card-label">Cargando...</div>
        </div>
      </div>

    </div>

  </main>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- Chart.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <!-- App logic -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="dashboard.js"></script>

  <script>
    // Greeting by time of day
    function setGreeting() {
      const h = new Date().getHours();
      const msg = h < 12 ? 'Buenos días' : h < 19 ? 'Buenas tardes' : 'Buenas noches';
      document.getElementById('greeting-msg').textContent = `${msg}, Toto 👋`;

      const txs = JSON.parse(localStorage.getItem('ld_transactions') || '[]');
      const now = new Date();
      const mes = now.getMonth();
      const gastosHoy = txs.filter(t => {
        const d = new Date(t.fecha);
        return t.tipo === 'gasto' && d.toDateString() === now.toDateString();
      }).reduce((s, t) => s + t.monto, 0);

      const sub = gastosHoy > 0
        ? `Hoy gastaste ${new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(gastosHoy)}`
        : 'Sin gastos registrados hoy · buen día ✓';
      document.getElementById('greeting-sub').textContent = sub;
    }

    // Streak grid (last 28 days, random-ish demo)
    function renderStreak() {
      const grid = document.getElementById('streak-grid');
      if (!grid) return;
      const txs = JSON.parse(localStorage.getItem('ld_transactions') || '[]');
      const today = new Date();
      const days = [];

      for (let i = 27; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(today.getDate() - i);
        const hasActivity = txs.some(t => new Date(t.fecha).toDateString() === d.toDateString());
        days.push({ d, hasActivity, isToday: i === 0 });
      }

      grid.innerHTML = days.map(({ d, hasActivity, isToday }) => {
        const cls = isToday ? 'streak-day today' : hasActivity ? 'streak-day active' : 'streak-day';
        const label = ['D','L','M','X','J','V','S'][d.getDay()];
        return `<div class="${cls}" title="${d.toLocaleDateString('es-AR')}">${label}</div>`;
      }).join('');
    }

    // Clear all data button
    document.getElementById('btn-clear-demo').addEventListener('click', (e) => {
      e.preventDefault();
      if (!confirm('¿Borrar todos los datos del dashboard? Esta acción no se puede deshacer.')) return;
      // Remove every ld_ key, including facultad data and migration flag
      Object.keys(localStorage)
        .filter(k => k.startsWith('ld_'))
        .forEach(k => localStorage.removeItem(k));
      showToast('Datos eliminados. Recargando...');
      setTimeout(() => location.reload(), 1200);
    });

    document.addEventListener('DOMContentLoaded', () => {
      setGreeting();
      renderStreak();
    });
  </script>

</body>
</html>
