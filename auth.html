<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeOS — Acceder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0e0f13;
      --surface:  #16181f;
      --border:   #2a2d38;
      --text:     #e2e4ec;
      --text-2:   #8b8fa8;
      --text-3:   #555870;
      --accent:   #0cc8b8;
      --coral:    #f87171;
      --green:    #34d399;
      --radius:   10px;
      --font-ui:  'DM Sans', system-ui, sans-serif;
      --font-mono:'JetBrains Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 44px;
      width: 100%;
      max-width: 380px;
    }
    .logo {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .tagline {
      font-size: 12px;
      color: var(--text-3);
      margin-bottom: 32px;
    }
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 500;
      background: none;
      border: none;
      color: var(--text-3);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .15s, border-color .15s;
      font-family: var(--font-ui);
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 7px;
    }
    .form-control {
      width: 100%;
      padding: 10px 14px;
      background: #0e0f13;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      font-family: var(--font-ui);
      transition: border-color .15s;
      outline: none;
    }
    .form-control:focus { border-color: var(--accent); }
    .btn {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: #0e0f13;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-ui);
      margin-top: 4px;
      transition: background .15s, transform .1s;
    }
    .btn:hover   { background: #0aa898; }
    .btn:active  { transform: scale(.98); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .msg {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .msg.error   { background: rgba(248,113,113,.1); color: var(--coral); border: 1px solid rgba(248,113,113,.25); }
    .msg.success { background: rgba(52,211,153,.1);  color: var(--green); border: 1px solid rgba(52,211,153,.25); }
    .msg.show    { display: block; }
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
      color: var(--text-3);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">LifeOS</div>
  <div class="tagline">Panel personal de Tobías & Sol</div>

  <div class="tabs">
    <button class="tab active" id="tab-login"    onclick="setTab('login')">Ingresar</button>
    <button class="tab"        id="tab-register" onclick="setTab('register')">Registrarse</button>
  </div>

  <!-- Login -->
  <div id="form-login">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" id="login-email" placeholder="tu@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input type="password" class="form-control" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn" id="btn-login" onclick="doLogin()">Ingresar</button>
    <div class="msg" id="login-msg"></div>
  </div>

  <!-- Register -->
  <div id="form-register" style="display:none">
    <div class="form-group">
      <label class="form-label">Nombre</label>
      <input type="text" class="form-control" id="reg-name" placeholder="Tobías">
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" id="reg-email" placeholder="tu@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input type="password" class="form-control" id="reg-password" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
    </div>
    <button class="btn" id="btn-register" onclick="doRegister()">Crear cuenta</button>
    <div class="msg" id="register-msg"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
  // Redirect if already logged in
  (async () => {
    const user = await getUser();
    if (user) window.location.href = 'index.html';
  })();

  function setTab(tab) {
    document.getElementById('tab-login').classList.toggle('active',    tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('form-login').style.display    = tab === 'login'    ? '' : 'none';
    document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = `msg ${type} show`;
  }

  function setLoading(btnId, loading) {
    document.getElementById(btnId).disabled = loading;
    document.getElementById(btnId).textContent = loading ? 'Cargando...' : btnId === 'btn-login' ? 'Ingresar' : 'Crear cuenta';
  }

  async function doLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) { showMsg('login-msg', 'Completá email y contraseña', 'error'); return; }

    setLoading('btn-login', true);
    const { error } = await sb.auth.signInWithPassword({ email, password });
    setLoading('btn-login', false);

    if (error) {
      showMsg('login-msg', error.message === 'Invalid login credentials'
        ? 'Email o contraseña incorrectos' : error.message, 'error');
    } else {
      window.location.href = 'index.html';
    }
  }

  async function doRegister() {
    const name     = document.getElementById('reg-name').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    if (!email || !password) { showMsg('register-msg', 'Completá email y contraseña', 'error'); return; }
    if (password.length < 6)  { showMsg('register-msg', 'La contraseña debe tener al menos 6 caracteres', 'error'); return; }

    setLoading('btn-register', true);
    const { error } = await sb.auth.signUp({
      email, password,
      options: { data: { full_name: name } }
    });
    setLoading('btn-register', false);

    if (error) {
      showMsg('register-msg', error.message, 'error');
    } else {
      showMsg('register-msg', '✓ Cuenta creada. Podés ingresar ahora.', 'success');
      setTimeout(() => setTab('login'), 1800);
    }
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const loginVisible = document.getElementById('form-login').style.display !== 'none';
    if (loginVisible) doLogin(); else doRegister();
  });
</script>
</body>
</html>
